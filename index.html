<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FAILED PAYMENT</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:#000;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
overflow:hidden;
color:white;
}

body::before{
content:'';
position:fixed;
width:100%;
height:100%;
background:
radial-gradient(circle at top,#ff000055,#000 60%);
z-index:-1;
animation:bg 5s infinite alternate;
}

@keyframes bg{
0%{transform:scale(1);}
100%{transform:scale(1.1);}
}

.card{
width:100%;
max-width:450px;
background:rgba(0,0,0,.92);
border-radius:40px;
overflow:hidden;
border:1px solid rgba(255,255,255,.2);
box-shadow:
0 0 50px rgba(255,0,0,.4);
backdrop-filter:blur(10px);
animation:card .7s ease;
}

@keyframes card{
from{
opacity:0;
transform:translateY(40px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.banner{
width:100%;
height:260px;
object-fit:cover;
display:block;
}

.content{
padding:28px;
}

.title{
font-size:20px;
font-weight:bold;
color:#ff2d55;
margin-bottom:25px;
text-shadow:0 0 10px red;
}

.row{
display:flex;
justify-content:space-between;
gap:15px;
margin-bottom:28px;
align-items:flex-start;
}

.label{
font-size:17px;
color:#8f8f8f;
min-width:110px;
}

.value{
font-size:18px;
font-weight:bold;
text-align:right;
flex:1;
line-height:1.5;
word-break:break-word;
}

.failed{
background:#ff0000;
padding:16px 40px;
border-radius:18px;
font-weight:bold;
font-size:20px;
box-shadow:0 0 20px red;
animation:pulse 1s infinite alternate;
}

@keyframes pulse{
from{
transform:scale(1);
box-shadow:0 0 10px red;
}
to{
transform:scale(1.05);
box-shadow:0 0 30px red;
}
}

.bottom{
margin-top:30px;
height:12px;
background:#111;
border-radius:20px;
overflow:hidden;
}

.bottom span{
display:block;
height:100%;
width:35%;
margin-left:auto;
background:red;
border-radius:20px;
box-shadow:0 0 20px red;
animation:load 2s infinite alternate;
}

@keyframes load{
from{
width:35%;
}
to{
width:45%;
}
}

@media(max-width:500px){

.banner{
height:220px;
}

.title{
font-size:17px;
}

.label{
font-size:15px;
min-width:90px;
}

.value{
font-size:16px;
}

.failed{
padding:14px 30px;
font-size:18px;
}

}
</style>
</head>

<body>

<div class="card">

<img src="banner.png" class="banner">

<div class="content">

<div class="title">
RINGKASAN PEMESANAN
</div>

<div class="row">
<div class="label">Nama Event</div>
<div class="value">WESTLIFE 25 YEARS OF HITS</div>
</div>

<div class="row">
<div class="label">Tanggal</div>
<div class="value">Saturday, 23 January 2027</div>
</div>

<div class="row">
<div class="label">Venue</div>
<div class="value">Gelora Bung Karno Main Stadium</div>
</div>

<div class="row">
<div class="label">Layanan</div>
<div class="value">Ticketing Service / Jastip Tiket</div>
</div>

<div class="row">
<div class="label">Status</div>
<div class="value">
<span class="failed">
FAILED
</span>
</div>
</div>

<div class="row">
<div class="label">Waktu</div>
<div class="value" id="waktu">
-
</div>
</div>

<div class="row">
<div class="label">Order ID</div>
<div class="value" id="orderid">
-
</div>
</div>

<div class="bottom">
<span></span>
</div>

</div>

</div>

<script>

/*
AMBIL DATA DARI INDEX.HTML
*/

const dataNama = localStorage.getItem('nama') || '-';
const dataKategori = localStorage.getItem('kategori') || '-';
const dataJumlah = localStorage.getItem('jumlah') || '-';
const dataTotal = localStorage.getItem('total') || '-';

const now = new Date();

document.getElementById('waktu').innerHTML =
now.toLocaleDateString('id-ID') +
', ' +
now.toLocaleTimeString('id-ID');

const random =
'WL25-' +
Math.floor(Math.random()*99999999);

document.getElementById('orderid').innerHTML =
random;

</script>

</body>
</html>
